<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Music School</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&family=Roboto:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="mat-typography">
  <script>
    try {
      if (localStorage.getItem('music-school-theme') === 'dark') {
        document.documentElement.classList.add('dark-theme');
        document.documentElement.style.colorScheme = 'dark';
        document.body.classList.add('dark-theme');
      }
    } catch (error) {
      document.documentElement.classList.remove('dark-theme');
      document.body.classList.remove('dark-theme');
    }
  </script>
  <app-root></app-root>
</body>
</html>
